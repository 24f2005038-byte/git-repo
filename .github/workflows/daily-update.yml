name: Daily Update by 24f2005038@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 12 * * *'  # Runs daily at 12:00 UTC (5:30 PM IST—specific time, no wildcards)
  workflow_dispatch:      # Lets you test manually right away

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update daily log
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M UTC') - Daily automated update" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-log.txt
          git commit -m "Daily update: $(date -u '+%Y-%m-%d')"
          git push
